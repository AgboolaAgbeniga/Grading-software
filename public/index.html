<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Automated grading engine for HNG Internship Frontend Track. Verify live deployments and GitHub repositories for technical requirements." />
  <meta name="keywords" content="HNG Internship, Grading, Frontend, Automation, GitHub Analysis, Task Verification" />
  <meta name="author" content="HNG Grading Team" />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="HNG Internship | Frontend Track Grading Platform" />
  <meta property="og:description" content="Official automated grading tool for HNG Interns. Instant report generation and export." />
  <meta property="og:image" content="favicon.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="HNG Internship | Frontend Track Grading Platform" />
  <meta property="twitter:description" content="Verify and grade HNG intern submissions automatically." />
  <meta property="twitter:image" content="favicon.png" />

  <title>HNG Internship | Frontend Track Grading Platform</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>HNG Internship: Frontend Track</h1>
      <p>Automated Grading Engine & Report Generator</p>
    </header>

    <form id="report-form">
      <section class="task-card">
        <h2>Task 1A</h2>
        <label>
          Live URL
          <input type="url" id="task1a-live" name="task1aLive" placeholder="https://example.com" required />
        </label>
        <label>
          GitHub repo URL
          <input type="url" id="task1a-repo" name="task1aRepo" placeholder="https://github.com/user/repo" required />
        </label>
      </section>

      <section class="task-card">
        <h2>Task 1B</h2>
        <label>
          Live URL
          <input type="url" id="task1b-live" name="task1bLive" placeholder="https://example.com" required />
        </label>
        <label>
          GitHub repo URL
          <input type="url" id="task1b-repo" name="task1bRepo" placeholder="https://github.com/user/repo" required />
        </label>
      </section>

      <button type="submit">Generate Report</button>
    </form>

    <section id="result" class="result hidden" aria-live="polite"></section>

    <section id="actions" class="actions hidden">
      <button id="download-pdf" class="btn-secondary">Download PDF Report</button>
      <button id="download-jpeg" class="btn-secondary">Download JPEG Image</button>
    </section>
  </main>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
